name: Update Screenshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update screenshots on'
        required: true
        default: 'main'

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true'

jobs:
  update-screenshots:
    name: Update Screenshot References
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v5

      - name: Update screenshot references
        run: ./gradlew updateDebugScreenshotTest --no-daemon

      - name: Commit updated screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/src/screenshotTestDebug/reference/**"
          if git diff --cached --quiet; then
            echo "No screenshot changes detected"
          else
            git commit -m "chore: update screenshot references from CI

            Generated on ubuntu-latest to match CI rendering environment.

            Co-Authored-By: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
            git push
          fi
