name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true'

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Update screenshot goldens (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew updateDebugScreenshotTest --no-daemon

      - name: Commit updated goldens if changed (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No screenshot changes"
          else
            git add '**/screenshotTestDebug/reference/**/*.png'
            git commit -m "chore: update screenshot goldens [skip ci]"
            git push origin main
          fi

      - name: Run tests, screenshot validation, and lint
        run: ./gradlew test validateDebugScreenshotTest :app:lintDebug --continue --no-daemon

      - name: Run Detekt
        run: ./gradlew detekt

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: quality-reports
          path: |
            **/build/reports/tests/
            **/build/reports/screenshotTest/
            **/build/reports/lint-results-*
          retention-days: 14

  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Report APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "### Debug APK Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
