name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true'

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Run tests and lint
        run: ./gradlew test :app:lintDebug --continue --no-daemon

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: quality-reports
          path: |
            **/build/reports/tests/
            **/build/reports/lint-results-*
          retention-days: 14

  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Setup CI signing
        run: |
          keytool -genkeypair \
            -alias ci \
            -keyalg RSA -keysize 2048 \
            -validity 1 \
            -dname "CN=CI Build" \
            -keystore ${{ github.workspace }}/ci.keystore \
            -storepass cibuilds \
            -keypass cibuilds \
            -noprompt

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/ci.keystore
          KEYSTORE_PASSWORD: cibuilds
          KEY_ALIAS: ci
          KEY_PASSWORD: cibuilds
        run: ./gradlew assembleRelease --no-daemon

      - name: Report APK size
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "### Release APK Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/ci.keystore
