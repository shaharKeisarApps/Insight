name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true'

jobs:
  update-screenshots:
    name: Update Screenshot Goldens
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@c85c95e3d7a0f598de4e9bb67999d746301dd51b
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-java@99b8673ff64fbf33d533da14c2f5fccc316d7b3b
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bbb36b68e8c1ce8db7f

      - name: Regenerate screenshot goldens on Linux
        run: ./gradlew updateDebugScreenshotTest --no-daemon

      - name: Commit updated goldens if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No screenshot changes, skipping commit"
          else
            git add '**/screenshotTestDebug/reference/**/*.png'
            git commit -m "chore: update screenshot goldens for release ${GITHUB_REF_NAME}"
            git push origin main
          fi

  test:
    name: Run Tests & Lint
    runs-on: ubuntu-latest
    needs: update-screenshots
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@c85c95e3d7a0f598de4e9bb67999d746301dd51b
        with:
          ref: main

      - uses: actions/setup-java@99b8673ff64fbf33d533da14c2f5fccc316d7b3b
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bbb36b68e8c1ce8db7f

      - name: Run tests, screenshot validation, and lint
        run: ./gradlew test validateDebugScreenshotTest :app:lintDebug --continue --no-daemon

      - name: Run Detekt
        run: ./gradlew detekt

  build-release:
    name: Build Release Artifacts
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@c85c95e3d7a0f598de4e9bb67999d746301dd51b

      - uses: actions/setup-java@99b8673ff64fbf33d533da14c2f5fccc316d7b3b
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bbb36b68e8c1ce8db7f

      - name: Setup signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Using release signing keys"
            echo "$KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.keystore
            echo "signing=release" >> "$GITHUB_OUTPUT"
          else
            echo "No signing secrets found, generating CI keystore"
            keytool -genkeypair \
              -alias ci \
              -keyalg RSA -keysize 2048 \
              -validity 1 \
              -dname "CN=CI Build" \
              -keystore ${{ github.workspace }}/release.keystore \
              -storepass cibuilds \
              -keypass cibuilds \
              -noprompt
            echo "signing=ci" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release APK and AAB
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'cibuilds' }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'ci' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'cibuilds' }}
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Report AAB size
        run: |
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          if [ -f "$AAB_PATH" ]; then
            SIZE=$(du -sh "$AAB_PATH" | cut -f1)
            echo "### Release AAB Size: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK=$(find app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "app/build/outputs/apk/release/Insight-v${VERSION}.apk"
          fi

      - name: Upload release APK
        uses: actions/upload-artifact@8f1d7ea6a5c2569b8e52d6d27a493a52dfc7c340
        with:
          name: release-apk
          path: app/build/outputs/apk/release/Insight-*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload release AAB
        uses: actions/upload-artifact@8f1d7ea6a5c2569b8e52d6d27a493a52dfc7c340
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload R8 mapping
        uses: actions/upload-artifact@8f1d7ea6a5c2569b8e52d6d27a493a52dfc7c340
        with:
          name: r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: warn
          retention-days: 90

  publish-release:
    name: Create GitHub Release
    needs: build-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@c85c95e3d7a0f598de4e9bb67999d746301dd51b
        with:
          fetch-depth: 0

      - name: Download release APK
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: release-apk
          path: artifacts/apk

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Insight v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.BODY }}
          files: artifacts/apk/*.apk
