build:
  maxIssues: 0
  excludeCorrectionPatterns:
    - '.*test.*'
    - '.*Test.*'

config:
  validation: true
  warningThreshold: 0
  excludePatterns:
    - '.*/resources/**'
    - '.*/build/**'

comments:
